name: CI (Python)

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop, hml, prd]
  pull_request:
    branches: [main, master, develop, hml, prd]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall -q src
